name: cabin_admin
description: Cabin Admin Panel - Panel de administración web para la app Cabin
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3

  # State management & routing
  provider: ^6.1.2
  go_router: ^14.2.7

  # UI / Fonts
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  animations: ^2.0.11

  # File handling (web compatible)
  file_picker: ^8.1.3
  cross_file: ^0.3.4+2

  # Map (OpenStreetMap - sin API key)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Charts
  fl_chart: ^0.69.0

  # Tables
  data_table_2: ^2.5.14

  # Rich text editor
  flutter_quill: ^11.5.0

  # Utilities
  intl: ^0.20.0
  uuid: ^4.5.1
  fluttertoast: ^8.2.8
  url_launcher: ^6.3.1
  responsive_framework: ^1.4.0
  dropdown_button2: ^2.3.9
  flutter_colorpicker: ^1.1.0
  http: ^1.2.2

  # Export
  csv: ^6.0.0
  pdf: ^3.11.1
  printing: ^5.13.2

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
